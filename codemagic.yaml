workflows:
  ios-workflow:
    name: Build and Submit to App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: 16.2
      vars:
        BUNDLE_ID: "com.nicklews.pomo"
        APP_NAME: "Pomo"
        TEAM_ID: "R4KY3NWNX8"
      groups:
        - apple-credentials

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp sw.js www/
          cp -r icons www/ 2>/dev/null || true
          cp -r ios-assets www/ 2>/dev/null || true

      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Set up code signing
        script: |
          set -e
          pip3 install --upgrade codemagic-cli-tools

          keychain initialize

          # Generate RSA key for certificate
          openssl genrsa -out /tmp/cert_key.pem 2048
          echo ">>> RSA key generated"

          # Create distribution certificate
          CERT_INFO=$(app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key /tmp/cert_key.pem \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --save 2>&1) || true
          echo ">>> Certificate creation output: $CERT_INFO"

          # If cert already exists, list and get it
          echo ">>> Listing existing certificates..."
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" || true

          # Add certificates to keychain
          keychain add-certificates || echo ">>> Warning: keychain add-certificates had issues"

          echo ">>> Certificates in keychain:"
          security find-identity -v -p codesigning

          # Get the bundle ID resource ID from Apple
          echo ">>> Getting bundle ID info..."
          BUNDLE_ID_INFO=$(app-store-connect bundle-ids list \
            --identifier-strict-match "$BUNDLE_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" 2>&1)
          echo ">>> Bundle ID info: $BUNDLE_ID_INFO"

          # Try creating the profile
          echo ">>> Creating App Store provisioning profile..."
          app-store-connect profiles create \
            --bundle-id "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key /tmp/cert_key.pem \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --save || echo ">>> Profile creation failed, trying fetch..."

          # Also try fetch-signing-files as backup
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key /tmp/cert_key.pem \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" || echo ">>> fetch-signing-files also had issues"

          # Check what profiles exist
          echo ">>> Searching for provisioning profiles..."
          find / -name "*.mobileprovision" 2>/dev/null | head -10
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true

          # Apply profiles to project
          xcode-project use-profiles --project ios/App/App.xcodeproj || echo ">>> use-profiles failed"

      - name: Fix Xcode project settings
        script: |
          cd ios/App
          sed -i '' 's/SUPPORTED_PLATFORMS = ".*"/SUPPORTED_PLATFORMS = "iphoneos iphonesimulator"/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' App.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' App.xcodeproj/project.pbxproj

          echo "=== CODE_SIGN settings ==="
          grep "CODE_SIGN" App.xcodeproj/project.pbxproj | sort -u
          echo "=== PROVISIONING settings ==="
          grep "PROVISIONING" App.xcodeproj/project.pbxproj | sort -u
          echo "=== DEVELOPMENT_TEAM settings ==="
          grep "DEVELOPMENT_TEAM" App.xcodeproj/project.pbxproj | sort -u

      - name: Build and archive iOS app
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=R4KY3NWNX8 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            SUPPORTED_PLATFORMS="iphoneos" \
            SUPPORTS_MACCATALYST=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --archive $CM_BUILD_DIR/App.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false

    artifacts:
      - $CM_BUILD_DIR/**/*.ipa
      - $CM_BUILD_DIR/App.xcarchive
