workflows:
  ios-workflow:
    name: Build and Submit to App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: 16.2
      vars:
        BUNDLE_ID: "com.nicklews.pomo"
        APP_NAME: "Pomo"
        TEAM_ID: "R4KY3NWNX8"
      groups:
        - apple-credentials

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp sw.js www/
          cp -r icons www/ 2>/dev/null || true
          cp -r ios-assets www/ 2>/dev/null || true

      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Sign, build, and archive
        script: |
          set -e

          pip3 install --upgrade codemagic-cli-tools

          keychain initialize

          openssl genrsa 2048 > /tmp/cert_key.pem 2>/dev/null
          CERT_KEY_CONTENT="$(cat /tmp/cert_key.pem)"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CERT_KEY_CONTENT" \
            --profiles-dir ~/Library/MobileDevice/Provisioning\ Profiles \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"

          keychain add-certificates

          find /Users/builder -name "*.mobileprovision" -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \; 2>/dev/null || true

          for PROFILE in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            UUID=$(security cms -D -i "$PROFILE" 2>/dev/null | grep -A1 "<key>UUID</key>" | grep "<string>" | sed 's/.*<string>//' | sed 's/<\/string>.*//')
            if [ -n "$UUID" ]; then
              cp "$PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
              PROFILE_UUID="$UUID"
            fi
          done

          PROFILE_NAME=$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision 2>/dev/null | grep -A1 "<key>Name</key>" | grep "<string>" | sed 's/.*<string>//' | sed 's/<\/string>.*//')
          echo ">>> UUID=$PROFILE_UUID NAME=$PROFILE_NAME"

          # Write AppDelegate.swift using python to avoid heredoc whitespace issues
          python3 -c "
          content = '''import UIKit
          import Capacitor

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?

              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  return true
              }

              func application(_ app: UIApplication, open url: URL, options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
                  return ApplicationDelegateProxy.shared.application(app, open: url, options: options)
              }

              func application(_ application: UIApplication, continue userActivity: NSUserActivity, restorationHandler: @escaping ([UIUserActivityRestoring]?) -> Void) -> Bool {
                  return ApplicationDelegateProxy.shared.application(application, continue: userActivity, restorationHandler: restorationHandler)
              }
          }
          '''
          import textwrap
          with open('ios/App/App/AppDelegate.swift', 'w') as f:
              f.write(textwrap.dedent(content))
          "

          echo ">>> AppDelegate.swift contents:"
          cat ios/App/App/AppDelegate.swift

          cd ios/App
          sed -i '' 's/SUPPORTED_PLATFORMS = ".*"/SUPPORTED_PLATFORMS = "iphoneos iphonesimulator"/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' App.xcodeproj/project.pbxproj || true
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' App.xcodeproj/project.pbxproj
          cd ../..

          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=R4KY3NWNX8 \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Apple Distribution" \
            "PROVISIONING_PROFILE=$PROFILE_UUID" \
            "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" \
            SUPPORTED_PLATFORMS="iphoneos" \
            SUPPORTS_MACCATALYST=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            SWIFT_VERSION=5.0 \
            SWIFT_STRICT_CONCURRENCY=minimal

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --archive $CM_BUILD_DIR/App.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false

    artifacts:
      - $CM_BUILD_DIR/**/*.ipa
      - $CM_BUILD_DIR/App.xcarchive
