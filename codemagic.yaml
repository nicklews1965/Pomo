workflows:
  ios-workflow:
    name: Build and Submit to App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: 16.2
      vars:
        BUNDLE_ID: "com.nicklews.pomo"
        APP_NAME: "Pomo"
        TEAM_ID: "R4KY3NWNX8"
      groups:
        - apple-credentials

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp sw.js www/
          cp -r icons www/ 2>/dev/null || true
          cp -r ios-assets www/ 2>/dev/null || true

      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Fix Xcode project settings
        script: |
          cd ios/App
          sed -i '' 's/SUPPORTED_PLATFORMS = ".*"/SUPPORTED_PLATFORMS = "iphoneos iphonesimulator"/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' App.xcodeproj/project.pbxproj || true

      - name: Set up code signing
        script: |
          pip3 install --upgrade codemagic-cli-tools

          keychain initialize

          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"

          keychain add-certificates

          # Get the provisioning profile UUID
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_UUID=$(basename "$PROFILE_PATH" .mobileprovision)
            echo "Found profile UUID: $PROFILE_UUID"
            echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          else
            echo "ERROR: No provisioning profiles found!"
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "Directory does not exist"
            exit 1
          fi

      - name: Build and archive iOS app
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=R4KY3NWNX8 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            "PROVISIONING_PROFILE=$PROFILE_UUID" \
            "PROVISIONING_PROFILE_SPECIFIER=" \
            SUPPORTED_PLATFORMS="iphoneos" \
            SUPPORTS_MACCATALYST=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --archive $CM_BUILD_DIR/App.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false

    artifacts:
      - $CM_BUILD_DIR/**/*.ipa
      - $CM_BUILD_DIR/App.xcarchive
