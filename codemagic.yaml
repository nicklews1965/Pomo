workflows:
  ios-workflow:
    name: Build and Submit to App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: latest
      vars:
        BUNDLE_ID: "com.nicklews.pomo"
        APP_NAME: "Pomo"
        TEAM_ID: "R4KY3NWNX8"
      groups:
        - apple-credentials

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp sw.js www/
          cp -r icons www/ 2>/dev/null || true
          cp -r ios-assets www/ 2>/dev/null || true

      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Set up code signing
        script: |
          pip3 install --upgrade codemagic-cli-tools

          keychain initialize

          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"

          keychain add-certificates
          xcode-project use-profiles

      - name: Build and archive iOS app
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive

      - name: Export for App Store
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/export \
          || true

          # Fallback: generate export options from profile
          if [ ! -d "$CM_BUILD_DIR/export" ]; then
            xcode-project build-ipa \
              --archive $CM_BUILD_DIR/App.xcarchive \
              --export-options-plist /tmp/ExportOptions.plist
          fi

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false

    artifacts:
      - $CM_BUILD_DIR/export/**/*.ipa
      - $CM_BUILD_DIR/**/*.ipa
      - $CM_BUILD_DIR/App.xcarchive
