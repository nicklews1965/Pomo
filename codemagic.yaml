workflows:
  ios-workflow:
    name: Build and Submit to App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        provisioning_profiles:
          - reference_name: ios_profile
      certificates:
        - reference_name: ios_certificate
      variables:
        BUNDLE_ID: "com.yourcompany.pomo"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_KEY_ID
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_PRIVATE_KEY
      xcode: latest
      node: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build iOS project with Capacitor
        script: |
          npm run build:ios

      - name: Set up Xcode build settings
        script: |
          cd ios/App
          # Update bundle identifier
          sed -i '' 's/com.getcapacitor.yourappname/'$BUNDLE_ID'/g' App.xcodeproj/project.pbxproj

      - name: Build for App Store
        script: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="ios_profile"

      - name: Create app archive
        script: |
          cd ios/App
          xcodebuild -archivePath $CM_BUILD_DIR/App.xcarchive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            archive

      - name: Export IPA
        script: |
          EXPORT_OPTS_PATH=$CM_BUILD_DIR/export_options.plist
          cat > $EXPORT_OPTS_PATH << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist $EXPORT_OPTS_PATH \
            -exportPath $CM_BUILD_DIR/ipa

      - name: Upload to App Store Connect
        script: |
          xcrun altool --upload-app -f $CM_BUILD_DIR/ipa/App.ipa \
            -t ios \
            --apiKey $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID

    artifacts:
      - $CM_BUILD_DIR/ipa/App.ipa
      - $CM_BUILD_DIR/build/DerivedData/Build/Products/Release-iphoneos/*.app

    publishing:
      app_store_connect:
        auth: key
        key_identifier: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_content: $APP_STORE_CONNECT_PRIVATE_KEY
